<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务规划与采集 - 智慧农业</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/识别页面.css') }}">
    <style>
        .mission-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .map-placeholder {
            width: 100%;
            height: 260px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--primary);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            margin-top: 15px;
            background-image: radial-gradient(circle at 2px 2px, rgba(0, 255, 157, 0.1) 1px, transparent 0);
            background-size: 20px 20px;
        }

        .path-line {
            position: absolute;
            width: 3px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            animation: pathGrowth 4s infinite ease-in-out;
            transform-origin: top left;
        }

        @keyframes pathGrowth {
            0% {
                width: 0;
                top: 30%;
                left: 20%;
                transform: rotate(30deg);
                opacity: 0.3;
            }

            50% {
                width: 180px;
                top: 30%;
                left: 20%;
                transform: rotate(30deg);
                opacity: 1;
            }

            100% {
                width: 180px;
                top: 30%;
                left: 20%;
                transform: rotate(30deg);
                opacity: 0;
            }
        }

        .data-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 12px;
            background: rgba(0, 210, 255, 0.15);
            border: 1px solid var(--accent);
            color: var(--accent);
            font-size: 0.85rem;
            margin: 4px;
            font-weight: bold;
        }

        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .sensor-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 20px 15px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .sensor-card:hover {
            border-color: var(--primary);
            background: rgba(0, 255, 157, 0.05);
        }

        .sensor-value {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--primary);
            display: block;
            margin-top: 5px;
        }

        .uav-status {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--primary);
            border: 1px solid var(--primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        @media (max-width: 700px) {
            .task-source-grid {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>

<body>
    {% include '_auth_user_strip.html' %}
    <div class="bg-decoration">
        <div class="orb orb-1" style="background: var(--primary); top: 20%; left: 10%;"></div>
        <div class="orb orb-2" style="background: var(--accent); bottom: 10%; right: 10%;"></div>
    </div>

    <div class="page-container">
        <a href="/mobile" class="btn-back">返回终端</a>

        <header>
            <h1>🛰️ 任务规划</h1>
            <p style="color:var(--text-dim)">根据灌溉建议与风险预警自动生成无人机任务，并同步至后台管理</p>
        </header>

        <main class="mission-grid">
            <!-- 智能任务生成（根据灌溉、风险数据自动生成无人机任务） -->
            <section class="card-glass" style="animation: fadeInUp 0.6s ease-out forwards;">
                <h2
                    style="text-align: left; font-size: 1.6rem; margin-bottom: 12px; color: #bd00ff; border-left: 4px solid #bd00ff; padding-left: 15px;">
                    智能任务生成</h2>
                <p style="font-size: 1rem; opacity: 0.9; margin-left: 20px;">
                    根据采集的灌溉建议与风险预警自动生成无人机灌溉、喷药任务，并同步至后台管理
                </p>
                <div style="margin: 15px 0 15px 20px;">
                    <span class="data-badge"
                        style="background: rgba(189,0,255,0.15); border-color: #bd00ff; color: #bd00ff;">数据驱动</span>
                    <span class="data-badge"
                        style="background: rgba(189,0,255,0.15); border-color: #bd00ff; color: #bd00ff;">一键生成</span>
                    <span class="data-badge"
                        style="background: rgba(189,0,255,0.15); border-color: #bd00ff; color: #bd00ff;">后台同步</span>
                </div>

                <div class="task-source-grid"
                    style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                    <div class="task-source-box"
                        style="background: rgba(0,210,255,0.08); border: 1px solid var(--accent); border-radius: 16px; padding: 20px;">
                        <h3 style="color: var(--accent); margin-bottom: 12px; font-size: 1.1rem;">💧 待生成灌溉任务</h3>
                        <div id="irrigationSourceList" style="max-height: 200px; overflow-y: auto; font-size: 0.9rem;">
                            <div style="text-align:center; padding:30px; color:var(--text-dim);">正在加载...</div>
                        </div>
                    </div>
                    <div class="task-source-box"
                        style="background: rgba(255,62,62,0.08); border: 1px solid #ff3e3e; border-radius: 16px; padding: 20px;">
                        <h3 style="color: #ff3e3e; margin-bottom: 12px; font-size: 1.1rem;">🛡️ 待生成喷药任务</h3>
                        <div id="riskSourceList" style="max-height: 200px; overflow-y: auto; font-size: 0.9rem;">
                            <div style="text-align:center; padding:30px; color:var(--text-dim);">正在加载...</div>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                    <button class="btn-action" id="btnGenerateTasks"
                        style="flex: 1; min-width: 200px; height: 56px; border-radius: 16px;">
                        <span>📋 根据采集数据生成任务并同步后台</span>
                    </button>
                    <span style="color: var(--accent); cursor: pointer; font-size: 0.9rem;"
                        onclick="loadTaskSourceData()">刷新数据</span>
                    <a href="/admin" style="color: var(--primary); font-size: 0.9rem;">查看后台任务 →</a>
                </div>
                <div id="generateResult" style="margin-top: 16px; min-height: 24px; font-size: 0.95rem;"></div>
            </section>
        </main>
    </div>
    <script>
        let selectedIrrigationIds = [];
        let selectedRiskIds = [];

        function showCustomConfirm(title, content, okText, cancelText) {
            return new Promise(function (resolve) {
                var overlay = document.getElementById('customModalOverlay');
                if (!overlay) {
                    overlay = document.createElement('div');
                    overlay.id = 'customModalOverlay';
                    overlay.className = 'custom-modal-overlay';
                    document.body.appendChild(overlay);
                }
                overlay.innerHTML = '<div class="custom-modal-card">' +
                    '<div class="custom-modal-title"><span>❓</span> ' + title + '</div>' +
                    '<div class="custom-modal-content">' + content + '</div>' +
                    '<div class="custom-modal-actions">' +
                    '<button class="btn-modal btn-modal-secondary" id="customModalCancel">' + (cancelText || '取消') + '</button>' +
                    '<button class="btn-modal btn-modal-primary" id="customModalOk">' + (okText || '确定') + '</button>' +
                    '</div></div>';
                overlay.classList.add('active');
                document.getElementById('customModalCancel').onclick = function () {
                    overlay.classList.remove('active');
                    setTimeout(function () { resolve(false); }, 300);
                };
                document.getElementById('customModalOk').onclick = function () {
                    overlay.classList.remove('active');
                    setTimeout(function () { resolve(true); }, 300);
                };
            });
        }

        function loadTaskSourceData() {
            const irrigEl = document.getElementById('irrigationSourceList');
            const riskEl = document.getElementById('riskSourceList');
            if (irrigEl) irrigEl.innerHTML = '<div style="text-align:center; padding:30px; color:var(--text-dim);">正在加载...</div>';
            if (riskEl) riskEl.innerHTML = '<div style="text-align:center; padding:30px; color:var(--text-dim);">正在加载...</div>';
            selectedIrrigationIds = [];
            selectedRiskIds = [];

            fetch('/api/task_plan/source_data?limit=10')
                .then(r => r.json())
                .then(data => {
                    if (!data.success || !data.data) {
                        if (irrigEl) irrigEl.innerHTML = '<div style="text-align:center; padding:30px; color:var(--text-dim);">加载失败</div>';
                        if (riskEl) riskEl.innerHTML = '<div style="text-align:center; padding:30px; color:var(--text-dim);">加载失败</div>';
                        return;
                    }
                    const irrig = data.data.irrigation_plans || [];
                    const risk = data.data.risk_alerts || [];

                    if (irrigEl) {
                        if (irrig.length === 0) {
                            irrigEl.innerHTML = '<div style="text-align:center; padding:30px; color:var(--text-dim);">暂无灌溉建议，请到<a href="/灌溉" style="color:var(--accent);">智能灌溉</a>生成</div>';
                        } else {
                            irrigEl.innerHTML = irrig.map(i => `
                                <label style="display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.06); cursor:pointer;">
                                    <input type="checkbox" class="irrig-cb" data-id="${i.id}" onchange="toggleIrrig(${i.id}, this.checked)">
                                    <span><strong>${i.plot_name}</strong> ${i.crop_type} · ${i.priority}优先级 · ${i.suggested_water_lpm}L/min ${i.suggested_duration_min}分钟</span>
                                </label>
                            `).join('');
                        }
                    }
                    if (riskEl) {
                        if (risk.length === 0) {
                            riskEl.innerHTML = '<div style="text-align:center; padding:30px; color:var(--text-dim);">暂无风险预警，请到<a href="/病虫害" style="color:var(--accent);">病虫害</a>生成</div>';
                        } else {
                            riskEl.innerHTML = risk.map(r => {
                                const lc = r.risk_level === '高' ? '#ff3e3e' : r.risk_level === '中' ? '#ffc107' : '#00ff9d';
                                return `
                                <label style="display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.06); cursor:pointer;">
                                    <input type="checkbox" class="risk-cb" data-id="${r.id}" onchange="toggleRisk(${r.id}, this.checked)">
                                    <span><strong>${r.plot_name}</strong> ${r.risk_type} · <span style="color:${lc}">${r.risk_level}</span> · ${(r.probability * 100 || 0).toFixed(0)}%</span>
                                </label>
                            `}).join('');
                        }
                    }
                })
                .catch(() => {
                    if (irrigEl) irrigEl.innerHTML = '<div style="text-align:center; padding:30px; color:var(--text-dim);">加载失败</div>';
                    if (riskEl) riskEl.innerHTML = '<div style="text-align:center; padding:30px; color:var(--text-dim);">加载失败</div>';
                });
        }

        function toggleIrrig(id, checked) {
            if (checked) selectedIrrigationIds.push(id);
            else selectedIrrigationIds = selectedIrrigationIds.filter(x => x !== id);
        }
        function toggleRisk(id, checked) {
            if (checked) selectedRiskIds.push(id);
            else selectedRiskIds = selectedRiskIds.filter(x => x !== id);
        }

        document.getElementById('btnGenerateTasks')?.addEventListener('click', function () {
            const btn = this;
            const resultEl = document.getElementById('generateResult');
            if (selectedIrrigationIds.length === 0 && selectedRiskIds.length === 0) {
                resultEl.innerHTML = '<span style="color:#ffc107;">请先勾选待生成的灌溉或喷药任务</span>';
                return;
            }
            btn.disabled = true;
            btn.querySelector('span').textContent = '正在生成并同步...';
            resultEl.innerHTML = '';

            fetch('/api/task_plan/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-User-Role': 'operator' },
                body: JSON.stringify({
                    irrigation_ids: selectedIrrigationIds,
                    risk_ids: selectedRiskIds
                })
            })
                .then(r => r.json())
                .then(async function (data) {
                    if (data.success) {
                        var list = (data.created || []).map(function (c) { return c.type + '：' + c.title; }).join('、');
                        resultEl.innerHTML = '<span style="color:var(--primary);">已生成 ' + data.count + ' 条任务并同步至后台：' + (list || '-') + '</span>';
                        selectedIrrigationIds = [];
                        selectedRiskIds = [];
                        document.querySelectorAll('.irrig-cb, .risk-cb').forEach(function (cb) { cb.checked = false; });
                        loadTaskSourceData();
                        var go = await showCustomConfirm('任务已生成', '是否跳转到后台进行任务分配？', '前往后台', '留在此页');
                        if (go) window.location.href = '/admin#task';
                    } else {
                        resultEl.innerHTML = '<span style="color:#ff3e3e;">' + (data.error || '生成失败') + '</span>';
                    }
                    btn.disabled = false;
                    btn.querySelector('span').textContent = '📋 根据采集数据生成任务并同步后台';
                })
                .catch(function (err) {
                    resultEl.innerHTML = '<span style="color:#ff3e3e;">请求失败</span>';
                    btn.disabled = false;
                    btn.querySelector('span').textContent = '📋 根据采集数据生成任务并同步后台';
                });
        });

        document.addEventListener('DOMContentLoaded', loadTaskSourceData);
    </script>
</body>

</html>
