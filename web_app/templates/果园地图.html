<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>果园多机调度地图</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 18px;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 16px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .toolbar button {
            padding: 10px 14px;
            border: 0;
            border-radius: 10px;
            background: rgba(0, 210, 255, 0.18);
            color: var(--text-bright);
            cursor: pointer;
        }

        .toolbar button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #amapContainer {
            width: 100%;
            height: 640px;
            border-radius: 12px;
            background: #122015;
            border: 1px solid var(--glass-border);
        }

        .legend {
            display: flex;
            gap: 12px;
            font-size: 13px;
            color: var(--text-dim);
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        .stat {
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.18);
        }

        .drone-list {
            max-height: 420px;
            overflow: auto;
        }

        .drone-item {
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 14px;
        }

        .mini {
            color: var(--text-dim);
            font-size: 12px;
            margin-top: 4px;
        }

        .status-ok {
            color: #26de81;
        }

        .status-run {
            color: #00d2ff;
        }

        .status-stop {
            color: #f8c291;
        }

        .sub-title {
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        .apple-popup {
            position: fixed;
            top: 80px;
            right: 24px;
            width: 320px;
            max-height: 420px;
            background: rgba(15, 25, 35, 0.95);
            border: 1px solid rgba(0, 210, 255, 0.35);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            overflow: hidden;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .apple-popup.secondary {
            top: 320px;
        }

        .apple-popup.hidden {
            opacity: 0;
            transform: translateX(20px);
            pointer-events: none;
        }

        .apple-popup .popup-title {
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 600;
            color: #00d2ff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .apple-popup .popup-stats {
            display: flex;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
        }

        .apple-popup .popup-stat {
            flex: 1;
            text-align: center;
            padding: 8px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
        }

        .apple-popup .popup-stat .label {
            font-size: 12px;
            color: var(--text-dim);
        }

        .apple-popup .popup-stat .val {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .apple-popup .popup-logs {
            max-height: 220px;
            overflow-y: auto;
            padding: 8px;
        }

        .apple-popup .log-item {
            padding: 10px 12px;
            margin-bottom: 8px;
            background: rgba(0, 0, 0, 0.25);
            border-left: 4px solid #26de81;
            border-radius: 6px;
            font-size: 13px;
            color: #e8f8f5;
        }

        .apple-popup .log-item .time {
            color: var(--accent);
            margin-right: 6px;
        }

        @media (max-width: 960px) {
            .layout {
                grid-template-columns: 1fr;
            }

            #amapContainer {
                height: 460px;
            }

            .apple-popup {
                right: 12px;
                width: 280px;
            }
        }
    </style>
</head>

<body>
    {% include '_auth_user_strip.html' %}
    <div class="page-container">
        <a href="/" class="btn-back">返回首页</a>
        <header>
            <h1>果园多机调度地图</h1>
            <p class="sub-title">俯瞰视角 | 多机分区 | 避障航线 | 实时状态</p>
        </header>

        <div id="applePopup" class="apple-popup hidden">
            <div class="popup-title">实时成熟度检测</div>
            <div class="popup-stats">
                <div class="popup-stat">
                    <div class="label">未成熟</div>
                    <div class="val" id="appleImmature">0</div>
                </div>
                <div class="popup-stat">
                    <div class="label">成熟</div>
                    <div class="val" id="appleMature">0</div>
                </div>
                <div class="popup-stat">
                    <div class="label">过熟</div>
                    <div class="val" id="appleOverripe">0</div>
                </div>
            </div>
            <div class="popup-logs" id="appleLogs"></div>
        </div>

        <div id="diseasePopup" class="apple-popup secondary hidden">
            <div class="popup-title">实时病虫害检测</div>
            <div class="popup-stats">
                <div class="popup-stat">
                    <div class="label">叶片</div>
                    <div class="val" id="diseaseLeaf">0</div>
                </div>
                <div class="popup-stat">
                    <div class="label">果实</div>
                    <div class="val" id="diseaseFruit">0</div>
                </div>
                <div class="popup-stat">
                    <div class="label">高/中/低</div>
                    <div class="val"><span id="diseaseHigh">0</span>/<span id="diseaseMedium">0</span>/<span
                            id="diseaseLow">0</span></div>
                </div>
            </div>
            <div class="popup-logs" id="diseaseLogs"></div>
        </div>

        <main class="layout">
            <section class="card">
                <div class="toolbar">
                    <button id="btnLoad">加载果园配置</button>
                    <button id="btnPlan">起飞无人机巡查</button>
                    <button id="btnReset">一键返航到机库</button>
                    <button id="btnRestart">重置并重新开始</button>
                    <label><input id="toggleZones" type="checkbox" checked> 分区</label>
                    <label><input id="toggleObstacles" type="checkbox" checked> 障碍物</label>
                    <label><input id="togglePaths" type="checkbox" checked> 航线</label>
                </div>
                <div id="amapContainer"></div>
                <div class="legend">
                    <span><i class="dot" style="background:#20bf6b;"></i> 分区</span>
                    <span><i class="dot" style="background:#ff7979;"></i> 障碍物</span>
                    <span><i class="dot" style="background:#f7b731;"></i> 无人机</span>
                    <span><i class="dot" style="background:#45aaf2;"></i> 规划轨迹</span>
                </div>
            </section>
            <aside class="card">
                <div class="stat"><strong>任务</strong>: <span id="missionName">未启动</span></div>
                <div class="stat"><strong>状态</strong>: <span id="missionStatus">idle</span></div>
                <div class="stat"><strong>Tick</strong>: <span id="missionTick">0</span></div>
                <div class="stat"><strong>综合评分</strong>: <span id="scoreTotal">-</span></div>
                <div class="stat mini" id="scoreDetail">效率/能耗/均衡：-</div>
                <h3>无人机状态</h3>
                <div id="droneList" class="drone-list"></div>
            </aside>
        </main>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        window.AMAP_JS_KEY = "{{ amap_js_key }}";
    </script>
    <script src="https://webapi.amap.com/maps?v=2.0&key={{ amap_js_key }}"></script>
    <script src="{{ url_for('static', filename='js/果园地图.js') }}"></script>
</body>

</html>
